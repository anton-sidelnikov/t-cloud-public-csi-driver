name: functional-pr-dispatch

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional PR number to post start/result comments back to"
        required: false
        default: ""
        type: string
      keep_resources:
        description: "Keep cluster resources after the run"
        required: false
        default: false
        type: boolean
      node_count:
        description: "CCE worker node count"
        required: false
        default: "1"
        type: string

permissions:
  contents: read
  issues: write
  packages: write
  pull-requests: write

env:
  GO_VERSION: "1.25.0"
  TF_VERSION: "1.14.6"

jobs:
  functional:
    name: Branch EVS Functional
    runs-on: ubuntu-latest
    timeout-minutes: 180
    concurrency:
      group: functional-dispatch-${{ github.ref_name }}
      cancel-in-progress: false
    env:
      OS_AUTH_URL: ${{ secrets.OS_AUTH_URL }}
      OS_REGION: ${{ secrets.OS_REGION }}
      OS_AVAILABILITY_ZONE: ${{ secrets.OS_AVAILABILITY_ZONE }}
      OS_DOMAIN_NAME: ${{ secrets.OS_DOMAIN_NAME }}
      OS_USERNAME: ${{ secrets.OS_USERNAME }}
      OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
      OS_PROJECT_ID: ${{ secrets.OS_PROJECT_ID }}
      OS_PROJECT_NAME: ${{ secrets.OS_PROJECT_NAME }}
      TF_VAR_node_count: ${{ inputs.node_count }}
      TF_VAR_kubeconfig_server: external
      CSI_TEST_KEEP_RESOURCES: ${{ inputs.keep_resources }}
      FUNCTIONAL_IMAGE: ghcr.io/${{ github.repository }}:dispatch-functional-${{ github.run_id }}-${{ github.sha }}
    steps:
      - name: Comment start
        if: inputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number("${{ inputs.pr_number }}"),
              body: `Started branch EVS functional run for \`${context.sha}\` from \`${context.ref.replace("refs/heads/", "")}\`.\n\nRun: ${runUrl}`,
            })

      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare artifact directory
        run: mkdir -p .cache/functional/artifacts

      - name: Build and push functional image
        id: build_image
        run: make functional-image-push

      - name: Provision functional infrastructure
        id: provision_infra
        run: |
          make functional-infra-init
          make functional-infra-up
          make functional-kubeconfig

      - name: Run functional tests
        id: run_tests
        env:
          KUBECONFIG: ${{ github.workspace }}/.cache/functional/kubeconfig
        run: |
          set -o pipefail
          make test-functional 2>&1 | tee .cache/functional/artifacts/test-functional.log

      - name: Collect cluster diagnostics
        if: failure()
        env:
          KUBECONFIG: ${{ github.workspace }}/.cache/functional/kubeconfig
        run: |
          mkdir -p .cache/functional/artifacts
          kubectl get pods -A -o wide > .cache/functional/artifacts/pods.txt || true
          kubectl get events -A --sort-by=.metadata.creationTimestamp > .cache/functional/artifacts/events.txt || true
          kubectl -n tcloud-public-csi-system get all -o wide > .cache/functional/artifacts/system-resources.txt || true
          kubectl -n tcloud-public-csi-system logs deployment/tcloud-public-csi-controller -c tcloud-public-csi-driver --tail=500 > .cache/functional/artifacts/controller.log || true
          kubectl -n tcloud-public-csi-system logs daemonset/tcloud-public-csi-node -c tcloud-public-csi-driver --tail=500 > .cache/functional/artifacts/node.log || true

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functional-diagnostics-dispatch-${{ github.run_id }}
          path: .cache/functional/artifacts
          if-no-files-found: ignore

      - name: Comment result
        if: always() && inputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const status = "${{ job.status }}"
            const icon = status === "success" ? "✅" : "❌"
            let body = `${icon} Branch EVS functional run for \`${context.sha}\` from \`${context.ref.replace("refs/heads/", "")}\` finished with status \`${status}\`.\n\nRun: ${runUrl}`
            if (status !== "success") {
              const failedStep =
                "${{ steps.run_tests.outcome }}" === "failure" ? "Run functional tests" :
                "${{ steps.provision_infra.outcome }}" === "failure" ? "Provision functional infrastructure" :
                "${{ steps.build_image.outcome }}" === "failure" ? "Build and push functional image" :
                "unknown"
              body += `\n\nFailed step: \`${failedStep}\``
              body += `\n\nDiagnostics artifact: \`functional-diagnostics-dispatch-${context.runId}\``
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number("${{ inputs.pr_number }}"),
              body,
            })

      - name: Destroy functional infrastructure
        if: always() && inputs.keep_resources != true
        run: make functional-infra-down
