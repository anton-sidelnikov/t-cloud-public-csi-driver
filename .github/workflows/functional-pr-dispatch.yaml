name: functional-pr

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      keep_resources:
        description: "Keep cluster resources after the run"
        required: false
        default: false
        type: boolean
      node_count:
        description: "CCE worker node count"
        required: false
        default: "1"
        type: string

permissions:
  contents: read
  packages: write

env:
  GO_VERSION: "1.25.0"
  TF_VERSION: "1.14.6"

jobs:
  functional:
    name: PR EVS Functional
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 180
    concurrency:
      group: functional-pr-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref_name }}
      cancel-in-progress: true
    env:
      OS_AUTH_URL: ${{ secrets.OS_AUTH_URL }}
      OS_REGION: ${{ secrets.OS_REGION }}
      OS_AVAILABILITY_ZONE: ${{ secrets.OS_AVAILABILITY_ZONE }}
      OS_DOMAIN_NAME: ${{ secrets.OS_DOMAIN_NAME }}
      OS_USERNAME: ${{ secrets.OS_USERNAME }}
      OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
      OS_PROJECT_ID: ${{ secrets.OS_PROJECT_ID }}
      OS_PROJECT_NAME: ${{ secrets.OS_PROJECT_NAME }}
      TF_VAR_node_count: ${{ github.event_name == 'workflow_dispatch' && inputs.node_count || '1' }}
      TF_VAR_kubeconfig_server: external
      CSI_TEST_KEEP_RESOURCES: ${{ github.event_name == 'workflow_dispatch' && inputs.keep_resources || 'false' }}
      FUNCTIONAL_IMAGE: ghcr.io/${{ github.repository }}:pr-functional-${{ github.run_id }}-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare artifact directory
        run: mkdir -p .cache/functional/artifacts

      - name: Build and push functional image
        id: build_image
        run: make functional-image-push

      - name: Provision functional infrastructure
        id: provision_infra
        run: |
          make functional-infra-init
          make functional-infra-up
          make functional-kubeconfig

      - name: Run functional tests
        id: run_tests
        env:
          KUBECONFIG: ${{ github.workspace }}/.cache/functional/kubeconfig
        run: |
          set -o pipefail
          make test-functional 2>&1 | tee .cache/functional/artifacts/test-functional.log

      - name: Collect cluster diagnostics
        if: failure()
        env:
          KUBECONFIG: ${{ github.workspace }}/.cache/functional/kubeconfig
        run: |
          mkdir -p .cache/functional/artifacts
          kubectl get pods -A -o wide > .cache/functional/artifacts/pods.txt || true
          kubectl get events -A --sort-by=.metadata.creationTimestamp > .cache/functional/artifacts/events.txt || true
          kubectl -n tcloud-public-csi-system get all -o wide > .cache/functional/artifacts/system-resources.txt || true
          kubectl -n tcloud-public-csi-system logs deployment/tcloud-public-csi-controller -c tcloud-public-csi-driver --tail=500 > .cache/functional/artifacts/controller.log || true
          kubectl -n tcloud-public-csi-system logs daemonset/tcloud-public-csi-node -c tcloud-public-csi-driver --tail=500 > .cache/functional/artifacts/node.log || true

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functional-diagnostics-pr-${{ github.run_id }}
          path: .cache/functional/artifacts
          if-no-files-found: ignore

      - name: Destroy functional infrastructure
        if: always() && (github.event_name != 'workflow_dispatch' || inputs.keep_resources != true)
        run: make functional-infra-down
