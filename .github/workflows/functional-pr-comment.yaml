name: functional-pr-comment

on:
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write
  packages: write
  pull-requests: write

env:
  GO_VERSION: "1.25.0"
  TF_VERSION: "1.14.6"

jobs:
  prepare:
    name: Prepare PR Functional Run
    if: github.event.issue.pull_request && contains(github.event.comment.body, 'run functional')
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.pr.outputs.allowed }}
      same_repo: ${{ steps.pr.outputs.same_repo }}
      pr_number: ${{ steps.pr.outputs.pr_number }}
      head_sha: ${{ steps.pr.outputs.head_sha }}
      head_repo: ${{ steps.pr.outputs.head_repo }}
      head_ref: ${{ steps.pr.outputs.head_ref }}
    steps:
      - name: Resolve PR metadata
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.issue.number
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            })

            const allowedAssociations = new Set(["OWNER", "MEMBER", "COLLABORATOR"])
            const allowed = allowedAssociations.has(context.payload.comment.author_association)
            const sameRepo = pr.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`

            core.setOutput("allowed", String(allowed))
            core.setOutput("same_repo", String(sameRepo))
            core.setOutput("pr_number", String(prNumber))
            core.setOutput("head_sha", pr.head.sha)
            core.setOutput("head_repo", pr.head.repo.full_name)
            core.setOutput("head_ref", pr.head.ref)

      - name: Comment if functional run is not allowed
        if: steps.pr.outputs.allowed != 'true' || steps.pr.outputs.same_repo != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const messages = []
            if ("${{ steps.pr.outputs.allowed }}" !== "true") {
              messages.push("only repository maintainers or collaborators can trigger `/run functional`")
            }
            if ("${{ steps.pr.outputs.same_repo }}" !== "true") {
              messages.push("functional runs are limited to same-repository PR branches because the workflow needs cloud credentials")
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `Functional run was not started: ${messages.join("; ")}.`,
            })

  functional:
    name: PR EVS Functional
    needs: prepare
    if: needs.prepare.outputs.allowed == 'true' && needs.prepare.outputs.same_repo == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    concurrency:
      group: functional-pr-${{ needs.prepare.outputs.pr_number }}
      cancel-in-progress: false
    env:
      OS_AUTH_URL: ${{ secrets.OS_AUTH_URL }}
      OS_REGION: ${{ secrets.OS_REGION }}
      OS_AVAILABILITY_ZONE: ${{ secrets.OS_AVAILABILITY_ZONE }}
      OS_DOMAIN_NAME: ${{ secrets.OS_DOMAIN_NAME }}
      OS_USERNAME: ${{ secrets.OS_USERNAME }}
      OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
      OS_PROJECT_ID: ${{ secrets.OS_PROJECT_ID }}
      OS_PROJECT_NAME: ${{ secrets.OS_PROJECT_NAME }}
      TF_VAR_kubeconfig_server: external
      FUNCTIONAL_IMAGE: ghcr.io/${{ github.repository }}:pr-functional-${{ needs.prepare.outputs.pr_number }}-${{ needs.prepare.outputs.head_sha }}
    steps:
      - name: Comment start
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number("${{ needs.prepare.outputs.pr_number }}"),
              body: `Started EVS functional run for \`${{ needs.prepare.outputs.head_sha }}\`.\n\nRun: ${runUrl}`,
            })

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.prepare.outputs.head_repo }}
          ref: ${{ needs.prepare.outputs.head_sha }}
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare artifact directory
        run: mkdir -p .cache/functional/artifacts

      - name: Build and push functional image
        id: build_image
        run: make functional-image-push

      - name: Provision functional infrastructure
        id: provision_infra
        run: |
          make functional-infra-init
          make functional-infra-up
          make functional-kubeconfig

      - name: Run functional tests
        id: run_tests
        env:
          KUBECONFIG: ${{ github.workspace }}/.cache/functional/kubeconfig
        run: |
          set -o pipefail
          make test-functional 2>&1 | tee .cache/functional/artifacts/test-functional.log

      - name: Collect cluster diagnostics
        if: failure()
        env:
          KUBECONFIG: ${{ github.workspace }}/.cache/functional/kubeconfig
        run: |
          mkdir -p .cache/functional/artifacts
          kubectl get pods -A -o wide > .cache/functional/artifacts/pods.txt || true
          kubectl get events -A --sort-by=.metadata.creationTimestamp > .cache/functional/artifacts/events.txt || true
          kubectl -n tcloud-public-csi-system get all -o wide > .cache/functional/artifacts/system-resources.txt || true
          kubectl -n tcloud-public-csi-system logs deployment/tcloud-public-csi-controller -c tcloud-public-csi-driver --tail=500 > .cache/functional/artifacts/controller.log || true
          kubectl -n tcloud-public-csi-system logs daemonset/tcloud-public-csi-node -c tcloud-public-csi-driver --tail=500 > .cache/functional/artifacts/node.log || true

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functional-diagnostics-pr-${{ needs.prepare.outputs.pr_number }}-${{ github.run_id }}
          path: .cache/functional/artifacts
          if-no-files-found: ignore

      - name: Comment result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const status = "${{ job.status }}"
            const icon = status === "success" ? "✅" : "❌"
            let body = `${icon} EVS functional run for \`${{ needs.prepare.outputs.head_sha }}\` finished with status \`${status}\`.\n\nRun: ${runUrl}`
            if (status !== "success") {
              const failedStep =
                "${{ steps.run_tests.outcome }}" === "failure" ? "Run functional tests" :
                "${{ steps.provision_infra.outcome }}" === "failure" ? "Provision functional infrastructure" :
                "${{ steps.build_image.outcome }}" === "failure" ? "Build and push functional image" :
                "unknown"
              body += `\n\nFailed step: \`${failedStep}\``
              body += `\n\nDiagnostics artifact: \`functional-diagnostics-pr-${{ needs.prepare.outputs.pr_number }}-${context.runId}\``
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number("${{ needs.prepare.outputs.pr_number }}"),
              body,
            })

      - name: Destroy functional infrastructure
        if: always()
        run: make functional-infra-down
