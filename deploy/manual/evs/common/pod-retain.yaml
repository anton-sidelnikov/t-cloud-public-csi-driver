apiVersion: v1
kind: Pod
metadata:
  name: evs-retain-pod
spec:
  restartPolicy: Never
  containers:
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          set -eu
          mkdir -p /data/retain
          echo retained > /data/retain/marker.txt
          tail -f /dev/null
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: evs-retain-pvc
