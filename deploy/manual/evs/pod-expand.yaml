apiVersion: v1
kind: Pod
metadata:
  name: evs-expand-pod
spec:
  restartPolicy: Never
  containers:
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          set -eu
          echo "before expansion"
          df -h /data
          tail -f /dev/null
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: evs-expand-pvc
